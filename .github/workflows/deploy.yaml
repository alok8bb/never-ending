name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Get commit hash
        run: echo "SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ secrets.REGISTRY_HOST }}/never-ending/web:${{ env.SHA }}
          push: true
          platforms: linux/amd64

      - name: Build and push bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.bot
          tags: ${{ secrets.REGISTRY_HOST }}/never-ending/bot:${{ env.SHA }}
          push: true
          platforms: linux/amd64

      - name: Deploy to k3s
        run: |
          # Update image tags in k8s manifests
          sed -i 's|image: registry.alk.pw/never-ending/web:.*|image: ${{ secrets.REGISTRY_HOST }}/never-ending/web:${{ env.SHA }}|g' k8s/web-deployment.yaml
          sed -i 's|image: registry.alk.pw/never-ending/bot:.*|image: ${{ secrets.REGISTRY_HOST }}/never-ending/bot:${{ env.SHA }}|g' k8s/web-deployment.yaml k8s/bot-deployment.yaml

          # Apply kubernetes manifests
          kubectl apply -f k8s/namespace.yaml -f k8s/web-deployment.yaml -f k8s/web-service.yaml -f k8s/bot-deployment.yaml -f k8s/ingress.yaml

          # Wait for rollouts to complete
          kubectl rollout status deployment/never-ending-web -n never-ending --timeout=120s
          kubectl rollout status deployment/never-ending-bot -n never-ending --timeout=120s
